<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Xem CV ứng viên</title>

<link rel="stylesheet" href="../css/cv_candidate.css">

</head>

<body>

<header class="header">
<h1>CV ỨNG VIÊN</h1>
</header>

<div class="container">

<div class="cv-box">

<iframe id="cvFrame"></iframe>

</div>

</div>

<script>

let cv = sessionStorage.getItem("cvData");

if(cv){

document.getElementById("cvFrame").src = cv;

}else{

document.querySelector(".cv-box").innerHTML =
"<h3>Không tìm thấy CV</h3>";

}

</script>

</body>
</html>
