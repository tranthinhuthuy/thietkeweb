<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập - Hợp Tác Xã</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">

<div class="auth-container">

<!-- ===== LOGIN ===== -->
<form id="loginForm">
<h2>Đăng nhập</h2>

<input type="email" id="loginEmail" placeholder="Email" required>

<div class="password-wrapper">
    <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
    <span class="toggle-password" onclick="togglePassword('loginPassword', this)">
    <svg class="eye-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
    </svg>
</span>
</div>

<div class="forgot-link">
<span onclick="showForgot()">Quên mật khẩu?</span>
</div>

<button type="submit">Đăng nhập</button>

<div class="switch-link">
Chưa có tài khoản?
<span onclick="showRegister()">Đăng ký</span>
</div>
</form>


<!-- ===== REGISTER ===== -->
<form id="registerForm" class="hidden">
<h2>Đăng ký</h2>

<input type="email" id="registerEmail" placeholder="Email" required>

<div class="password-wrapper">
    <input type="password" id="registerPassword" placeholder="Mật khẩu" required>
    <span class="toggle-password" onclick="togglePassword('registerPassword', this)">👁</span>
</div>

<div class="password-wrapper">
    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
    <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁</span>
</div>

<button type="submit">Đăng ký</button>

<div class="switch-link">
Đã có tài khoản?
<span onclick="showLogin()">Đăng nhập</span>
</div>
</form>


<!-- ===== FORGOT PASSWORD ===== -->
<form id="forgotForm" class="hidden">
<h2>Khôi phục mật khẩu</h2>

<input type="email" id="forgotEmail" placeholder="Nhập email" required>

<button type="button" onclick="sendResetToken()">Gửi mã xác thực</button>

<div id="resetStep" class="hidden">
    <input type="text" id="resetToken" placeholder="Nhập mã xác thực">
<div class="password-wrapper">
    <input type="password" id="newPassword" placeholder="Mật khẩu mới">
    <span class="toggle-password" onclick="togglePassword('newPassword', this)">👁</span>
</div>
    <button type="button" onclick="resetPassword()">Đặt lại mật khẩu</button>
</div>

<div class="switch-link">
    <span onclick="showLogin()">Quay lại đăng nhập</span>
</div>
</form>

</div>


<!-- Popup lưu mật khẩu -->
<div id="savePasswordBox" class="save-box hidden">
<h3>Lưu thông tin?</h3>
    <input type="email" id="savedEmail" readonly>
    <input type="password" id="savedPassword" readonly>
<div class="save-actions">
    <button onclick="saveInfo()">Lưu</button>
    <button class="secondary" onclick="closeSaveBox()">Không bao giờ</button>
</div>
</div>


<script>
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const forgotForm = document.getElementById("forgotForm");

function showLogin(){
loginForm.classList.remove("hidden");
registerForm.classList.add("hidden");
forgotForm.classList.add("hidden");
}

function showRegister(){
loginForm.classList.add("hidden");
registerForm.classList.remove("hidden");
forgotForm.classList.add("hidden");
}

function showForgot(){
loginForm.classList.add("hidden");
registerForm.classList.add("hidden");
forgotForm.classList.remove("hidden");
}

/* Ẩn hiện mật khẩu */
function togglePassword(id, icon){
    let input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";

        icon.innerHTML = `
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="2" y1="22" x2="22" y2="2"/>
        </svg>
        `;
    }else{
        input.type = "password";

        icon.innerHTML = `
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
        `;
    }
}

/* Đăng ký */
registerForm.addEventListener("submit", function(e){
e.preventDefault();

let email = registerEmail.value;
let pass = registerPassword.value;
let confirm = confirmPassword.value;

if(pass !== confirm){
alert("Mật khẩu không khớp!");
return;
}

localStorage.setItem("htxAccount", JSON.stringify({email:email,password:pass}));

savedEmail.value=email;
savedPassword.value=pass;
savePasswordBox.classList.remove("hidden");

showLogin();
});

/* Đăng nhập */
loginForm.addEventListener("submit", function(e){
e.preventDefault();

let email = loginEmail.value;
let pass = loginPassword.value;
let acc = JSON.parse(localStorage.getItem("htxAccount"));

if(!acc){
alert("Chưa có tài khoản!");
return;
}

if(email===acc.email && pass===acc.password){
sessionStorage.setItem("htxLogin","true");
window.location.href="dashboard.html";
}else{
alert("Sai thông tin!");
}
});


/* Popup */
function saveInfo(){
alert("Đã lưu!");
closeSaveBox();
}
function closeSaveBox(){
savePasswordBox.classList.add("hidden");
}
/* ===== QUÊN MẬT KHẨU ===== */

let generatedToken = "";

function sendResetToken(){
    let email = document.getElementById("forgotEmail").value.trim();
    let acc = JSON.parse(localStorage.getItem("htxAccount"));

    if(!acc || email !== acc.email){
        alert("Email không tồn tại!");
        return;
    }

    // Tạo mã 6 số
    generatedToken = Math.floor(100000 + Math.random() * 900000).toString();

    alert("Mã xác thực của bạn là: " + generatedToken + " (Demo)");

    document.getElementById("resetStep").classList.remove("hidden");
}

function resetPassword(){
    let tokenInput = document.getElementById("resetToken").value.trim();
    let newPass = document.getElementById("newPassword").value.trim();

    if(tokenInput !== generatedToken){
        alert("Mã xác thực không đúng!");
        return;
    }

    if(newPass === ""){
        alert("Vui lòng nhập mật khẩu mới!");
        return;
    }

    let acc = JSON.parse(localStorage.getItem("htxAccount"));
    acc.password = newPass;
    localStorage.setItem("htxAccount", JSON.stringify(acc));

    alert("Đổi mật khẩu thành công!");
    showLogin();

    // Reset lại form
    document.getElementById("resetStep").classList.add("hidden");
}
</script>

</body>
</html>
