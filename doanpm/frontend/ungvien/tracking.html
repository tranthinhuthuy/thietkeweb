<!DOCTYPE html> 
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Theo dõi hồ sơ</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
<h1>THEO DÕI HỒ SƠ ỨNG TUYỂN</h1>
</header>

<div class="container">

<div class="tracking-grid" id="trackingContainer"></div>

</div>

<script>

const container = document.getElementById("trackingContainer");

let applications =
JSON.parse(localStorage.getItem("applications")) || [];

applications.sort((a,b)=>{

return new Date(b.applyDate) - new Date(a.applyDate);

});

/* =========================
NẾU CHƯA CÓ HỒ SƠ
========================= */

if(applications.length === 0){

container.innerHTML = `

<p style="text-align:center;font-size:18px;">

Bạn chưa nộp hồ sơ ứng tuyển nào.

</p>

`;

}else{

applications.forEach((app,index)=>{

/* =========================
ĐỔI MÀU THEO TRẠNG THÁI
========================= */

let statusClass = "";

if(app.status === "Đạt"){

statusClass = "approved-status";

}
else if(app.status === "Không đạt"){

statusClass = "rejected-status";

}
else{

statusClass = "pending-status";

}

/* =========================
ẢNH CÔNG VIỆC
========================= */

let imagePath = "../images/default-job.jpg";

if(app.jobName){

if(app.jobName.toLowerCase().includes("cà phê")){

imagePath = "../images/thu_hoach_ca_phe.png";

}
else if(app.jobName.toLowerCase().includes("bốc vác")){

imagePath = "../images/bocvac.jpg";

}
else if(app.jobName.toLowerCase().includes("đóng gói")){

imagePath = "../images/dong_goi_nong_san.png";

}
else if(app.jobName.toLowerCase().includes("thu hoạch")){

imagePath = "../images/thuhoach.jpg";

}
else if(app.jobName.toLowerCase().includes("hái tiêu")){

imagePath = "../images/hai_tieu.png";

}
else if(app.jobName.toLowerCase().includes("sơ chế")){

imagePath = "../images/so_che_nong_san.png";

}

}

/* nếu có jobImage riêng thì ưu tiên */

if(app.jobImage){

imagePath = app.jobImage;

}

container.innerHTML += `

<div class="card tracking-card">

<img
src="${imagePath}"
class="job-image"
alt="Hình công việc"
>

<h2 style="color:#2e8b57">

${app.jobName || "Chưa chọn công việc"}

</h2>

<p>

<b>Họ tên:</b>

${app.fullName}

</p>

<p>

<b>SĐT:</b>

${app.phone}

</p>

<p>

<b>Email:</b>

${app.email || "Không có"}

</p>

<p>

<b>Ngày nộp:</b>

${app.applyDate}

</p>

<hr>

<h3>CV</h3>

${
app.cvFile

? `

<div class="cv-wrapper">

<button
class="btn cv-btn"
onclick="viewCV(${index})">

Xem / Tải CV

</button>

</div>

`

: `

<p>Chưa tải CV</p>

`
}

<hr>

<h3>Trạng thái</h3>

<p class="status ${statusClass}">

${app.status || "Đang chờ xét duyệt"}

</p>

<div class="feedback-box">

<b>Phản hồi:</b>

<br><br>

${
app.status === "Đạt"

? "Hồ sơ đạt. Vui lòng liên hệ HTX để nhận việc."

: app.status === "Không đạt"

? "Hồ sơ không đạt.<br>Lý do: " + app.employerFeedback

: "Hồ sơ đang chờ xét duyệt."
}

</div>

<br>

<button
class="delete-btn"
onclick="deleteApplication(${index})">

Xóa hồ sơ

</button>

</div>

`;

});

}

/* =========================
XEM HOẶC TẢI CV
========================= */

function viewCV(index){

let applications =
JSON.parse(localStorage.getItem("applications")) || [];

let cv = applications[index].cvFile;

if(!cv || cv === ""){

alert("Không tìm thấy CV.");

return;

}

/* tách base64 */

let arr = cv.split(",");

let mime = arr[0].match(/:(.*?);/)[1];

let bstr = atob(arr[1]);

let n = bstr.length;

let u8arr = new Uint8Array(n);

while(n--){

u8arr[n] = bstr.charCodeAt(n);

}

/* tạo blob */

let blob = new Blob([u8arr], {type:mime});

let url = URL.createObjectURL(blob);

/* PDF hoặc ảnh → mở xem */

if(mime.includes("pdf") || mime.includes("image")){

window.open(url,"_blank");

}else{

/* file khác → tải */

let a = document.createElement("a");

a.href = url;

a.download = "CV_UngVien";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}

}

/* =========================
XÓA HỒ SƠ
========================= */

function deleteApplication(index){

if(confirm("Bạn có chắc muốn xóa hồ sơ này không?")){

let applications =
JSON.parse(localStorage.getItem("applications")) || [];

applications.splice(index,1);

localStorage.setItem(
"applications",
JSON.stringify(applications)
);

location.reload();

}

}

</script>

</body>
</html>
