<!DOCTYPE html>  
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Ứng tuyển công việc</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
<h1>NỘP HỒ SƠ ỨNG TUYỂN CÔNG VIỆC</h1>
</header>

<div class="container">

<form id="applyForm">

<h3>1. THÔNG TIN CÁ NHÂN</h3>

<input type="text" id="fullName" placeholder="Họ và tên" required>
<input type="date" id="dob" required>
<input type="text" id="address" placeholder="Địa chỉ">
<input type="text" id="phone" placeholder="Số điện thoại" required>
<input type="email" id="email" placeholder="Email">

<h3>2. THÔNG TIN CÔNG VIỆC</h3>

<!-- Tự động hiển thị thông tin công việc đã chọn -->
<input type="text" id="jobTitle" placeholder="Công việc" readonly>
<input type="text" id="jobLocation" placeholder="Địa điểm" readonly>
<input type="text" id="jobSalary" placeholder="Mức lương" readonly>

<h3>3. KỸ NĂNG/ KINH NGHIỆM</h3>

<textarea id="skills" placeholder="Kỹ năng"></textarea>

<h3>4. ĐƠN XIN VIỆC / CV</h3>

<input type="file" id="cvFile" accept=".pdf,.doc,.docx,.png,.jpg">

<p id="fileName" style="color:green;margin-top:5px;"></p>

<h3>5. GHI CHÚ</h3>

<textarea id="note" placeholder="Ghi chú"></textarea>

<br><br>

<button type="submit">Gửi hồ sơ</button>

</form>

</div>


<script>

// ===============================
// TỰ ĐỘNG HIỂN THỊ THÔNG TIN CÔNG VIỆC
// ===============================
window.onload = function(){

// ===============================
// HIỂN THỊ THÔNG TIN CÔNG VIỆC
// ===============================

document.getElementById("jobTitle").value =
sessionStorage.getItem("applyTitle") || "";

document.getElementById("jobLocation").value =
sessionStorage.getItem("applyLocation") || "";

document.getElementById("jobSalary").value =
sessionStorage.getItem("applySalary") || "";

};



// hiển thị tên file sau khi chọn

document.getElementById("cvFile").addEventListener("change", function(){

let file = this.files[0];

if(file){

document.getElementById("fileName").innerText = "Đã chọn: " + file.name;

}

});



// xử lý gửi hồ sơ

document.getElementById("applyForm").addEventListener("submit", function(e){

e.preventDefault();

let fileInput = document.getElementById("cvFile");

let file = fileInput.files[0];

let reader = new FileReader();

reader.onload = function(){

// ===============================
// LẤY DANH SÁCH HỒ SƠ
// ===============================

let applications =
JSON.parse(localStorage.getItem("applications")) || [];

// ===============================
// LẤY THÔNG TIN JOB
// ===============================

let job =
JSON.parse(sessionStorage.getItem("applyJob")) || {};

// ===============================
// TẠO HỒ SƠ MỚI
// ===============================

let newApp = {

// ================= JOB =================

jobName:
document.getElementById("jobTitle").value,

jobLocation:
document.getElementById("jobLocation").value,

jobSalary:
document.getElementById("jobSalary").value,

fullName:
document.getElementById("fullName").value,

dob:
document.getElementById("dob").value,

address:
document.getElementById("address").value,

phone:
document.getElementById("phone").value,

email:
document.getElementById("email").value,

// ===== ẢNH CÔNG VIỆC =====
jobImage: job.image || "",

skills:
document.getElementById("skills").value,

note:
document.getElementById("note").value,

cvFile:
file ? reader.result : "",

applyDate:
new Date().toLocaleDateString(),

status: "Đã gửi",

employerFeedback: ""

};
// ===== LƯU PROFILE =====

localStorage.setItem("profile", JSON.stringify({

    // ===== THÔNG TIN CƠ BẢN =====

    pFullName:
    document.getElementById("fullName").value,

    pDob:
    document.getElementById("dob").value,

    pGender: "",

    pPhone:
    document.getElementById("phone").value,

    pEmail:
    document.getElementById("email").value,

    pAddress:
    document.getElementById("address").value,

    // ===== THÔNG TIN NGHỀ NGHIỆP =====

    pJob:
    document.getElementById("jobTitle").value,

    pType: "Thời vụ",

    pTime: "Cả ngày",

    pSalary:
    document.getElementById("jobSalary").value,

    // ===== KINH NGHIỆM / KỸ NĂNG =====

    pExperience:
    document.getElementById("skills").value,

    pSkill:
    document.getElementById("skills").value

}));
// ===============================
// LƯU HỒ SƠ
// ===============================

applications.unshift(newApp);

localStorage.setItem(
"applications",
JSON.stringify(applications)
);

alert("Gửi hồ sơ thành công!");

window.location.href = "tracking.html";

};

// nếu có file thì đọc file

if(file){

reader.readAsDataURL(file);

}else{

reader.onload();

}

});

</script>

</body>
</html>
