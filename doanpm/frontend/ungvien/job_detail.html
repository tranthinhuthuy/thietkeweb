<!DOCTYPE html> 
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết công việc</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container" id="jobDetail"></div>

<span id="userNameDisplay" style="display:none;"></span>

<button onclick="logout()" id="logoutBtn" style="display:none;">
    Đăng xuất
</button>

<script src="../js/auth.js"></script>

<script>

/* ================= LẤY DỮ LIỆU TỪ LOCALSTORAGE ================= */

const container =
    document.getElementById("jobDetail");

const job =
    JSON.parse(localStorage.getItem("detailJob"));

/* ================= KIỂM TRA CÔNG VIỆC ================= */

if(!job){

    container.innerHTML = `
        <h2>Không tìm thấy công việc!</h2>

        <a href="index.html">

            <button>
                Quay lại trang chủ
            </button>

        </a>
    `;

}else{

    const image =
        job.image ||
        "../images/default_job.png";

    const applicants =
        Number(job.applicants || 0);

    const quantity =
        Number(job.quantity || 0);

    const today =
        new Date();

    const deadline =
        job.deadline ? new Date(job.deadline) : new Date(0);

    let statusText =
        "Đang tuyển";

    let statusColor =
        "#2e8b57";

    if(applicants >= quantity){
        statusText = "Đã đủ hồ sơ";
        statusColor = "#8e24aa";
    }
    else if(deadline && today > deadline){
        statusText = "Hết hạn";
        statusColor = "#e53935";
    }
    else if((deadline - today)/(1000*60*60*24) <= 3){
        statusText = "Sắp hết hạn";
        statusColor = "orange";
    }

    container.innerHTML = `

        <div class="detail-card">

            <img
                src="${image}"
                alt="${job.title}"
                style="
                    width:100%;
                    max-height:350px;
                    object-fit:cover;
                    border-radius:12px;
                    margin-bottom:20px;
                "
            >

            <h2>${job.title}</h2>

            <p>
                <b>Trạng thái:</b>

                <span style="
                    background:${statusColor};
                    color:white;
                    padding:6px 12px;
                    border-radius:6px;
                    font-weight:bold;">
                    ${statusText}
                </span>
            </p>

            <p><b>Công ty:</b> ${job.company || ""}</p>
            <p><b>Lương:</b> ${job.salary || ""}</p>
            <p><b>Địa điểm:</b> ${job.address || ""}</p>
            <p><b>Hạn nộp:</b> ${formatDate(job.deadline)}</p>
            <p><b>Số lượng tuyển:</b> ${job.quantity || ""}</p>
            <p><b>Số hồ sơ đã ứng tuyển:</b> ${applicants}</p>
            <p><b>Email liên hệ:</b> ${job.email || ""}</p>
            <p><b>Số điện thoại:</b> ${job.phone || ""}</p>

            <hr>

            <h3>Mô tả công việc</h3>
            <p>${job.description || ""}</p>

            <h3>Yêu cầu công việc</h3>
            <p>${job.requirement || ""}</p>

            <h3>Quyền lợi</h3>
            <p>${job.benefit || ""}</p>

            <h3>Hồ sơ bao gồm</h3>
            <p>${job.document || ""}</p>

            <br>

            <button onclick="applyNow()">
                Ứng tuyển ngay
            </button>

            <a href="index.html">
                <button>
                    Quay lại
                </button>
            </a>

        </div>

    `;
}

/* ================= FORMAT DATE ================= */

function formatDate(dateString){

    if(!dateString){
        return "";
    }

    const date = new Date(dateString);

    if(isNaN(date.getTime())){
        return "";
    }

    const day = String(date.getDate()).padStart(2, "0");
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const year = date.getFullYear();

    return `${day}/${month}/${year}`;
}

/* ================= ỨNG TUYỂN ================= */

function applyNow(){

    if(!job){
        return;
    }

    const applicants = Number(job.applicants || 0);
    const quantity = Number(job.quantity || 0);

    const today = new Date();
    const deadline = job.deadline ? new Date(job.deadline) : new Date(0);

    if(applicants >= quantity){
        alert("Công việc đã đủ hồ sơ!");
        return;
    }

    if(deadline && today > deadline){
        alert("Công việc đã hết hạn!");
        return;
    }

    sessionStorage.setItem("applyTitle", job.title);
    sessionStorage.setItem("applyLocation", job.address);
    sessionStorage.setItem("applySalary", job.salary);
    sessionStorage.setItem("applyJobId", job.id);

    if(sessionStorage.getItem("isLogin") === "true"){
        window.location.href = "apply.html";
    } else {
        sessionStorage.setItem("redirectAfterLogin", "apply.html");
        alert("Vui lòng đăng nhập trước khi ứng tuyển!");
        window.location.href = "login.html";
    }
}

</script>

</body>
</html>
