<!DOCTYPE html> 

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập - Ứng viên</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="auth-page">

<div class="auth-container">

<!-- ================= LOGIN ================= -->

<form id="loginForm">

<h2>Đăng nhập</h2>

<input type="email" id="loginEmail" placeholder="Email" required>

<div class="password-wrapper">
<input type="password" id="loginPassword" placeholder="Mật khẩu" required>

<span class="toggle-password" onclick="togglePassword('loginPassword', this)">
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>
</div>

<div class="forgot-link">
<span onclick="showForgot()" class="forgot-text">Quên mật khẩu?</span>
</div>

<button type="submit">Đăng nhập</button>

<div class="switch-link">
Chưa có tài khoản?
<span onclick="showRegister()">Đăng ký</span>
</div>

</form>

<!-- ================= REGISTER ================= -->

<form id="registerForm" class="hidden">

<h2>Đăng ký</h2>

<input type="email" id="registerEmail" placeholder="Email" required>

<div class="password-wrapper">
<input type="password" id="registerPassword" placeholder="Mật khẩu" required>

<span class="toggle-password" onclick="togglePassword('registerPassword', this)">
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>
</div>

<div class="password-wrapper">
<input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>

<span class="toggle-password" onclick="togglePassword('confirmPassword', this)">
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>
</div>

<button type="submit">Đăng ký</button>

<div class="switch-link">
Đã có tài khoản?
<span onclick="showLogin()">Đăng nhập</span>
</div>

</form>

<!-- ================= FORGOT PASSWORD ================= -->

<form id="forgotForm" class="hidden">

<h2>Khôi phục mật khẩu</h2>

<input type="email" id="forgotEmail" placeholder="Nhập email đã đăng ký" required>

<button type="button" onclick="sendResetToken()">Gửi mã xác thực</button>

<div id="resetStep" class="hidden">

<input type="text" id="resetToken" placeholder="Nhập mã xác thực">

<div class="password-wrapper">
<input type="password" id="newPassword" placeholder="Mật khẩu mới">

<span class="toggle-password" onclick="togglePassword('newPassword', this)">
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>
</div>

<button type="button" onclick="resetPassword()">Đặt lại mật khẩu</button>

</div>

<div class="switch-link">
<span onclick="showLogin()">Quay lại đăng nhập</span>
</div>

</form>

</div>

<!-- ================= POPUP LƯU MẬT KHẨU ================= -->

<div id="savePasswordPopup" class="save-box hidden">

<p>Lưu thông tin đăng nhập?</p>

<input type="email" id="saveEmail" readonly>

<div class="password-wrapper">

<input type="password" id="savePasswordField" readonly>

<span class="toggle-password" onclick="togglePassword('savePasswordField', this)">
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
</span>

</div>

<div class="save-actions">
<button onclick="savePassword()">Lưu</button>
<button class="secondary" onclick="neverSave()">Không bao giờ</button>
</div>

</div>

<script src="../js/auth.js"></script>

<script>

/* ===== LẤY FORM ===== */

const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const forgotForm = document.getElementById("forgotForm");


/* ===== CHUYỂN FORM ===== */

function showLogin(){
loginForm.classList.remove("hidden");
registerForm.classList.add("hidden");
forgotForm.classList.add("hidden");
}

function showRegister(){
loginForm.classList.add("hidden");
registerForm.classList.remove("hidden");
forgotForm.classList.add("hidden");
}

function showForgot(){
loginForm.classList.add("hidden");
registerForm.classList.add("hidden");
forgotForm.classList.remove("hidden");
}


/* ===== HIỆN / ẨN PASSWORD ===== */

function togglePassword(id, icon){

let input = document.getElementById(id);

if(input.type === "password"){

input.type = "text";

if(icon){

icon.innerHTML = `
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
<line x1="2" y1="22" x2="22" y2="2"/>
</svg>
`;

}

}else{

input.type = "password";

if(icon){

icon.innerHTML = `
<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="black" stroke-width="2">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>
</svg>
`;

}

}

}


/* ================= ĐĂNG KÝ ================= */

registerForm.addEventListener("submit", function(e){

e.preventDefault();

let email = document.getElementById("registerEmail").value.trim();
let pass = document.getElementById("registerPassword").value.trim();
let confirm = document.getElementById("confirmPassword").value.trim();

if(pass !== confirm){
alert("Mật khẩu không khớp!");
return;
}


/* ===== LẤY DANH SÁCH TÀI KHOẢN ===== */

let accounts =
JSON.parse(localStorage.getItem("accounts")) || [];


/* ===== KIỂM TRA EMAIL ĐÃ TỒN TẠI ===== */

let existed = accounts.find(acc => acc.email === email);

if(existed){

alert("Email đã tồn tại!");
return;

}


/* ===== TẠO TÀI KHOẢN ===== */

let account = {
email: email,
password: pass
};


/* ===== LƯU TÀI KHOẢN ===== */

accounts.push(account);

localStorage.setItem(
"accounts",
JSON.stringify(accounts)
);


/* ===== POPUP LƯU ===== */

document.getElementById("saveEmail").value =
email;

document.getElementById("savePasswordField").value =
pass;

document.getElementById("savePasswordPopup")
.classList.remove("hidden");


alert("Đăng ký thành công! Hãy đăng nhập.");

showLogin();

});


/* ================= ĐĂNG NHẬP ================= */

loginForm.addEventListener("submit", function(e){

e.preventDefault();

let email = document.getElementById("loginEmail").value.trim();
let pass = document.getElementById("loginPassword").value.trim();


/* ===== LẤY DANH SÁCH TÀI KHOẢN ===== */

let accounts =
JSON.parse(localStorage.getItem("accounts")) || [];


/* ===== TÌM TÀI KHOẢN ===== */

let found = accounts.find(acc =>
acc.email === email &&
acc.password === pass
);

if(!found){

alert("Sai email hoặc mật khẩu!");
return;

}


/* ===== LƯU NGƯỜI ĐANG ĐĂNG NHẬP ===== */

localStorage.setItem(
"currentUser",
JSON.stringify(found)
);


/* ===== ĐÁNH DẤU ĐĂNG NHẬP ===== */

localStorage.setItem("isLogin", "true");

sessionStorage.setItem("isLogin", "true");


/* ===== GỌI LOGIN AUTH ===== */

login(email);


/* ===== CHUYỂN TRANG ===== */

let redirect =
sessionStorage.getItem("redirectAfterLogin");

if(redirect){

sessionStorage.removeItem("redirectAfterLogin");

window.location.href = redirect;

}else{

window.location.href = "../ungvien/index.html";

}

});


/* ================= POPUP ================= */

function savePassword(){

alert("Đã lưu!");

closePopup();

}

function neverSave(){

closePopup();

}

function closePopup(){

document.getElementById(
"savePasswordPopup"
).classList.add("hidden");

}


/* ================= QUÊN MẬT KHẨU ================= */

let generatedToken = "";

function sendResetToken(){

let email = document.getElementById("forgotEmail").value.trim();

let accounts =
JSON.parse(localStorage.getItem("accounts")) || [];


/* ===== TÌM TÀI KHOẢN ===== */

let acc = accounts.find(item =>
item.email === email
);

if(!acc){

alert("Email không tồn tại!");
return;

}

generatedToken = Math.floor(100000 + Math.random()*900000).toString();

alert("Mã xác thực: " + generatedToken);

document.getElementById("resetStep").classList.remove("hidden");

}


function resetPassword(){

let token = document.getElementById("resetToken").value.trim();
let newPass = document.getElementById("newPassword").value.trim();

if(token !== generatedToken){

alert("Mã xác thực không đúng!");
return;

}

if(newPass === ""){

alert("Vui lòng nhập mật khẩu mới!");
return;

}


let email = document.getElementById("forgotEmail").value.trim();

let accounts =
JSON.parse(localStorage.getItem("accounts")) || [];


/* ===== CẬP NHẬT MẬT KHẨU ===== */

accounts = accounts.map(acc => {

if(acc.email === email){

acc.password = newPass;

}

return acc;

});


/* ===== LƯU LẠI ===== */

localStorage.setItem(
"accounts",
JSON.stringify(accounts)
);

alert("Đổi mật khẩu thành công!");

document.getElementById("resetStep").classList.add("hidden");

showLogin();

}

</script>
</body>
</html>
